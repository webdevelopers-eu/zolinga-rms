<html lang="id-ID">

<!--
    <login-box
        [ layer="maximized|minimized" ]
        [ click-outside-to-close ]
        [ show-card="card-name" ]
        [ password-reset-hash="hash" ]
        [ remove-on-close ]
        ></login-box>
-->

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="login-box.css">
    <meta name="gettext" content="replace">
    <c-resources assets="forms/css"></c-resources>
<meta charset="UTF-8"></head>

<body>
    <div class="curtain"></div>

    <card-deck show-card="sign-in" flip-perspective="800" flip-speed="0.5">
        <form id="sing-in-form" class="c-form" part="card sign-in" card-name="sign-in" data-event="rms:login">
            <h1 part="heading h1 sign-in-heading" gettext="zolinga-rms:.#69fc31">Masuk</h1>
            <slot name="sign-in-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#2afd8a">Alamat E-mail</span>
                <input autocomplete="email" type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#0ab8ab" placeholder="Alamat E-mail" required>
            </label>
            <label>
                <span gettext="zolinga-rms:.#51ec4d">Kata Sandi</span>
                <input autocomplete="current-password" type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#0c0e13" placeholder="Kata Sandi" required>
            </label>

            <label class="center">
                <input type="checkbox" class="form-check-input" name="remember">
                <span class="form-check" gettext="zolinga-rms:.#e9c0ef">Ingat saya</span>
            </label>

            <slot name="sign-in-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#f340c4">Masuk</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('password-recover');" gettext="zolinga-rms:.#335167">Lupa kata sandi?</a>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-up');" gettext="zolinga-rms:.#d062c4">Daftar</a>

            <google-login></google-login>
        </form>
        <form id="sing-up-form" class="c-form" part="card sign-up" card-name="sign-up" data-event="rms:register">
            <h1 part="heading h1 sign-up-heading" gettext="zolinga-rms:.#21e8a3">Daftar</h1>

            <slot name="sign-up-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#b524cf">Nama depan</span>
                <input autocomplete="given-name" required type="text" class="form-control" name="givenName" gettext="zolinga-rms:placeholder#689efa" placeholder="Nama depan">
            </label>
            <label>
                <span gettext="zolinga-rms:.#6e6f06">Nama keluarga</span>
                <input autocomplete="family-name" required type="text" class="form-control" name="familyName" gettext="zolinga-rms:placeholder#7caf87" placeholder="Nama keluarga">
            </label>
            <label>
                <span gettext="zolinga-rms:.#997ec5">Alamat E-mail</span>
                <input autocomplete="email" required type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#fc800c" placeholder="Alamat E-mail">
            </label>
            <label>
                <span gettext="zolinga-rms:.#95ccea">Kata Sandi</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#cd999e" placeholder="Kata Sandi">
            </label>
            <label>
                <span gettext="zolinga-rms:.#5edd15">Konfirmasi kata sandi</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password2" gettext="zolinga-rms:placeholder#dc8d92" placeholder="Konfirmasi Kata Sandi">
            </label>

            <slot name="sign-up-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#a65877">Daftar</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#0fc7a3">Masuk</a>
        </form>
        <form id="password-recover-form" class="c-form" part="card password-recover" card-name="password-recover" data-event="rms:recover">
            <h1 part="heading h1 password-recover-heading" gettext="zolinga-rms:.#766415">Pemulihan Kata Sandi</h1>

            <slot name="password-recover-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#afa09e">Alamat E-mail</span>
                <input autocomplete="email" required type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#25967e" placeholder="Alamat E-mail">
            </label>

            <slot name="password-recover-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#82a589">Pulihkan Kata Sandi</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#c0815e">Masuk</a>
        </form>
        <form id="password-reset-form" class="c-form" part="card password-reset" card-name="password-reset" data-event="rms:reset">
            <h1 part="heading h1 password-reset-heading" gettext="zolinga-rms:.#771ac8">Reset Kata Sandi</h1>

            <slot name="password-reset-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#1a3809">Kata sandi baru</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#1c72e0" placeholder="Kata Sandi">
            </label>
            <label>
                <span gettext="zolinga-rms:.#cdedfb">Konfirmasi kata sandi</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password2" gettext="zolinga-rms:placeholder#7311c0" placeholder="Konfirmasi kata sandi">
            </label>

            <input required type="hidden" name="hash" value="">

            <slot name="password-reset-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#86d5e1">Reset Kata Sandi</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#4c7059">Masuk</a>

        </form>
    </card-deck>

</body>

</html>
