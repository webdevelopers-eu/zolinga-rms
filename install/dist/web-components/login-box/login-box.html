<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title gettext=".">Sign in</title>
    <link rel="stylesheet" type="text/css" href="login-box.css" />
</head>

<body>
    <div part="messages" class="messages"></div>

    <card-deck show-card="sign-in" flip-perspective="800" flip-speed="0.5">
        <form part="card sign-in" card-name="sign-in" data-event="rms:login">
            <h1 gettext=".">Sign in</h1>
            <slot name="sign-in-before"></slot>

            <label class="form-group">
                <span gettext=".">Username</span>
                <input type="text" class="form-control" name="username" gettext="placeholder" placeholder="Enter username">
            </label>
            <label class="form-group">
                <span gettext=".">Password</span>
                <input type="password" class="form-control" name="password" gettext="placeholder" placeholder="Password">
            </label>

            <label class="form-check">
                <input type="checkbox" class="form-check-input" name="remember">
                <span class="form-check" gettext=".">Remember me</span>
            </label>

            <button part="button" type="submit" class="btn btn-primary" gettext=".">Sign in</button>

            <a href="javascript:" gettext=".">Forgot password?</a>

            <a href="javascript:" onclick="this.closest('card-deck').showCard('sign-up');" gettext=".">
                Sign up
            </a>

            <slot name="sign-in-after"></slot>
        </form>
        <form part="card sign-up" card-name="sign-up" data-event="rms:register">
            <h1 gettext=".">Sign up</h1>

            <slot name="sign-up-before"></slot>

            <label class="form-group">
                <span gettext=".">Username</span>
                <input type="text" class="form-control" name="username" gettext="placeholder" placeholder="Enter username">
            </label>
            <label class="form-group">
                <span gettext=".">Password</span>
                <input type="password" class="form-control" name="password" gettext="placeholder" placeholder="Password">
            </label>
            <label class="form-group">
                <span gettext=".">Confirm password</span>
                <input type="password" class="form-control" name="password2" gettext="placeholder" placeholder="Password">
            </label>
            <button part="button" type="submit" class="btn btn-primary" gettext=".">Sign up</button>

            <a href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext=".">
                Sign in
            </a>

            <slot name="sign-up-after"></slot>
        </form>
    </card-deck>

</body>

</html>
