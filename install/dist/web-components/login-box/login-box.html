<!DOCTYPE html>
<html>

<!--
    <login-box
        [ layer="maximized|minimized" ]
        [ click-outside-to-close ]
        ></login-box>
-->

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="login-box.css" />
    <c-resources assets="forms/css"></c-resources>
</head>

<body>
    <div class="curtain for-guests"></div>

    <card-deck class="for-guests" show-card="sign-in" flip-perspective="800" flip-speed="0.5">
        <form class="c-form" part="card sign-in" card-name="sign-in" data-event="rms:login">
            <h1 part="heading h1 sign-in-heading" gettext=".">Sign in</h1>
            <slot name="sign-in-before"></slot>

            <label>
                <span gettext=".">Username</span>
                <input type="email" class="form-control" name="username" gettext="placeholder" placeholder="Enter username" required>
            </label>
            <label>
                <span gettext=".">Password</span>
                <input type="password" minlength="6" class="form-control" name="password" gettext="placeholder" placeholder="Password" required>
            </label>

            <label class="center">
                <input type="checkbox" class="form-check-input" name="remember">
                <span class="form-check" gettext=".">Remember me</span>
            </label>

            <button part="button" type="submit" class="primary" gettext=".">Sign in</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('password-recovery');" gettext=".">
                Forgot password?
            </a>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-up');" gettext=".">
                Sign up
            </a>

            <slot name="sign-in-after"></slot>
        </form>
        <form class="c-form" part="card sign-up" card-name="sign-up" data-event="rms:register">
            <h1 part="heading h1 sign-up-heading" gettext=".">Sign up</h1>

            <slot name="sign-up-before"></slot>

            <label>
                <span gettext=".">Username</span>
                <input type="text" class="form-control" name="username" gettext="placeholder" placeholder="Enter username">
            </label>
            <label>
                <span gettext=".">Password</span>
                <input type="password" minlength="6" class="form-control" name="password" gettext="placeholder" placeholder="Password">
            </label>
            <label>
                <span gettext=".">Confirm password</span>
                <input type="password" minlength="6" class="form-control" name="password2" gettext="placeholder" placeholder="Password">
            </label>

            <button part="button" type="submit" class="primary" gettext=".">Sign up</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext=".">
                Sign in
            </a>

            <slot name="sign-up-after"></slot>
        </form>
        <form class="c-form" part="card password-recovery" card-name="password-recovery" data-event="rms:recover">
            <h1 part="heading h1 password-recovery-heading" gettext=".">Password recovery</h1>

            <slot name="password-recovery-before"></slot>

            <label>
                <span gettext=".">Username</span>
                <input type="text" class="form-control" name="username" gettext="placeholder" placeholder="Enter username">
            </label>

            <button part="button" type="submit" class="primary" gettext=".">Recover password</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext=".">
                Sign in
            </a>

            <slot name="password-recovery-after"></slot>
        </form>
    </card-deck>

</body>

</html>
