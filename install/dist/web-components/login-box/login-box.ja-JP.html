<html lang="ja-JP">

<!--
    <login-box
        [ layer="maximized|minimized" ]
        [ click-outside-to-close ]
        [ show-card="card-name" ]
        [ password-reset-hash="hash" ]
        [ remove-on-close ]
        ></login-box>
-->

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="login-box.css">
    <meta name="gettext" content="replace">
    <c-resources assets="forms/css"></c-resources>
<meta charset="UTF-8"></head>

<body>
    <div class="curtain"></div>

    <card-deck show-card="sign-in" flip-perspective="800" flip-speed="0.5">
        <form id="sing-in-form" class="c-form" part="card sign-in" card-name="sign-in" data-event="rms:login">
            <h1 part="heading h1 sign-in-heading" gettext="zolinga-rms:.#69fc31">ログイン</h1>
            <slot name="sign-in-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#2afd8a">E メール</span>
                <input autocomplete="email" type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#0ab8ab" placeholder="E メール" required>
            </label>
            <label>
                <span gettext="zolinga-rms:.#51ec4d">パスワード</span>
                <input autocomplete="current-password" type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#0c0e13" placeholder="パスワード" required>
            </label>

            <label class="center">
                <input type="checkbox" class="form-check-input" name="remember">
                <span class="form-check" gettext="zolinga-rms:.#e9c0ef">ログイン状態を保存</span>
            </label>

            <slot name="sign-in-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#f340c4">ログイン</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('password-recover');" gettext="zolinga-rms:.#335167">パスワードをお忘れですか？</a>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-up');" gettext="zolinga-rms:.#d062c4">登録する</a>

            <google-login></google-login>
        </form>
        <form id="sing-up-form" class="c-form" part="card sign-up" card-name="sign-up" data-event="rms:register">
            <h1 part="heading h1 sign-up-heading" gettext="zolinga-rms:.#21e8a3">登録する</h1>

            <slot name="sign-up-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#b524cf">名</span>
                <input autocomplete="given-name" required type="text" class="form-control" name="givenName" gettext="zolinga-rms:placeholder#689efa" placeholder="名">
            </label>
            <label>
                <span gettext="zolinga-rms:.#6e6f06">姓</span>
                <input autocomplete="family-name" required type="text" class="form-control" name="familyName" gettext="zolinga-rms:placeholder#7caf87" placeholder="姓">
            </label>
            <label>
                <span gettext="zolinga-rms:.#997ec5">E メール</span>
                <input autocomplete="email" required type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#fc800c" placeholder="E メール">
            </label>
            <label>
                <span gettext="zolinga-rms:.#95ccea">パスワード</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#cd999e" placeholder="パスワード">
            </label>
            <label>
                <span gettext="zolinga-rms:.#5edd15">パスワード（確認）</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password2" gettext="zolinga-rms:placeholder#dc8d92" placeholder="パスワード（確認）">
            </label>

            <slot name="sign-up-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#a65877">登録する</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#0fc7a3">ログイン</a>
        </form>
        <form id="password-recover-form" class="c-form" part="card password-recover" card-name="password-recover" data-event="rms:recover">
            <h1 part="heading h1 password-recover-heading" gettext="zolinga-rms:.#766415">パスワードの再発行</h1>

            <slot name="password-recover-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#afa09e">E メール</span>
                <input autocomplete="email" required type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#25967e" placeholder="E メール">
            </label>

            <slot name="password-recover-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#82a589">パスワードをリセット</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#c0815e">ログイン</a>
        </form>
        <form id="password-reset-form" class="c-form" part="card password-reset" card-name="password-reset" data-event="rms:reset">
            <h1 part="heading h1 password-reset-heading" gettext="zolinga-rms:.#771ac8">パスワードのリセット</h1>

            <slot name="password-reset-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#1a3809">新しいパスワード</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#1c72e0" placeholder="パスワード">
            </label>
            <label>
                <span gettext="zolinga-rms:.#cdedfb">パスワード（確認）</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password2" gettext="zolinga-rms:placeholder#7311c0" placeholder="パスワード（確認）">
            </label>

            <input required type="hidden" name="hash" value="">

            <slot name="password-reset-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#86d5e1">パスワードをリセット</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#4c7059">ログイン</a>

        </form>
    </card-deck>

</body>

</html>
