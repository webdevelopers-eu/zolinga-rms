<html lang="fr-FR">

<!--
    <login-box
        [ layer="maximized|minimized" ]
        [ click-outside-to-close ]
        [ show-card="card-name" ]
        [ password-reset-hash="hash" ]
        [ remove-on-close ]
        ></login-box>
-->

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="login-box.css">
    <meta name="gettext" content="replace">
    <c-resources assets="forms/css"></c-resources>
<meta charset="UTF-8"></head>

<body>
    <div class="curtain"></div>

    <card-deck show-card="sign-in" flip-perspective="800" flip-speed="0.5">
        <form id="sing-in-form" class="c-form" part="card sign-in" card-name="sign-in" data-event="rms:login">
            <h1 part="heading h1 sign-in-heading" gettext="zolinga-rms:.#69fc31">Se connecter</h1>
            <slot name="sign-in-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#2afd8a">E-mail</span>
                <input autocomplete="email" type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#0ab8ab" placeholder="E-mail" required>
            </label>
            <label>
                <span gettext="zolinga-rms:.#51ec4d">Mot de passe</span>
                <input autocomplete="current-password" type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#0c0e13" placeholder="Mot de passe" required>
            </label>

            <label class="center">
                <input type="checkbox" class="form-check-input" name="remember">
                <span class="form-check" gettext="zolinga-rms:.#e9c0ef">Se souvenir de moi</span>
            </label>

            <slot name="sign-in-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#f340c4">Se connecter</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('password-recover');" gettext="zolinga-rms:.#335167">Mot de passe oublié ?</a>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-up');" gettext="zolinga-rms:.#d062c4">S'inscrire</a>

            <google-login></google-login>
        </form>
        <form id="sing-up-form" class="c-form" part="card sign-up" card-name="sign-up" data-event="rms:register">
            <h1 part="heading h1 sign-up-heading" gettext="zolinga-rms:.#21e8a3">S'inscrire</h1>

            <slot name="sign-up-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#b524cf">Prénom</span>
                <input autocomplete="given-name" required type="text" class="form-control" name="givenName" gettext="zolinga-rms:placeholder#689efa" placeholder="Prénom">
            </label>
            <label>
                <span gettext="zolinga-rms:.#6e6f06">Nom de famille</span>
                <input autocomplete="family-name" required type="text" class="form-control" name="familyName" gettext="zolinga-rms:placeholder#7caf87" placeholder="Nom de famille">
            </label>
            <label>
                <span gettext="zolinga-rms:.#997ec5">E-mail</span>
                <input autocomplete="email" required type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#fc800c" placeholder="E-mail">
            </label>
            <label>
                <span gettext="zolinga-rms:.#95ccea">Mot de passe</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#cd999e" placeholder="Mot de passe">
            </label>
            <label>
                <span gettext="zolinga-rms:.#5edd15">Confirmer le mot de passe</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password2" gettext="zolinga-rms:placeholder#dc8d92" placeholder="Confirmer le mot de passe">
            </label>

            <slot name="sign-up-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#a65877">S'inscrire</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#0fc7a3">Se connecter</a>
        </form>
        <form id="password-recover-form" class="c-form" part="card password-recover" card-name="password-recover" data-event="rms:recover">
            <h1 part="heading h1 password-recover-heading" gettext="zolinga-rms:.#766415">Récupération de mot de passe</h1>

            <slot name="password-recover-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#afa09e">E-mail</span>
                <input autocomplete="email" required type="email" class="form-control" name="username" gettext="zolinga-rms:placeholder#25967e" placeholder="E-mail">
            </label>

            <slot name="password-recover-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#82a589">Récupérer le mot de passe</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#c0815e">Se connecter</a>
        </form>
        <form id="password-reset-form" class="c-form" part="card password-reset" card-name="password-reset" data-event="rms:reset">
            <h1 part="heading h1 password-reset-heading" gettext="zolinga-rms:.#771ac8">Réinitialisation du mot de passe</h1>

            <slot name="password-reset-before"></slot>

            <label>
                <span gettext="zolinga-rms:.#1a3809">Nouveau mot de passe</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password" gettext="zolinga-rms:placeholder#1c72e0" placeholder="Mot de passe">
            </label>
            <label>
                <span gettext="zolinga-rms:.#cdedfb">Confirmer le mot de passe</span>
                <input autocomplete="new-password" required type="password" minlength="6" class="form-control" name="password2" gettext="zolinga-rms:placeholder#7311c0" placeholder="Confirmer le mot de passe">
            </label>

            <input required type="hidden" name="hash" value="">

            <slot name="password-reset-after"></slot>

            <button part="button" type="submit" class="primary" gettext="zolinga-rms:.#86d5e1">Réinitialiser le mot de passe</button>

            <a part="link" class="small center" href="javascript:" onclick="this.closest('card-deck').showCard('sign-in');" gettext="zolinga-rms:.#4c7059">Se connecter</a>

        </form>
    </card-deck>

</body>

</html>
