<html lang="hi-IN">

<head>
    <meta name="gettext" content="translate">
    <link rel="stylesheet" href="login-settings.css">
    <c-resources assets="forms/css"></c-resources>
    <meta charset="UTF-8">
    <meta name="gettext" content="translate">
</head>
<body>
    <main id="security">
        <form action="javascript:">
            <popup-container>
                <div slot="title" gettext="zolinga-rms:.#0f4c4a">सुरक्षा</div>

                <div slot="content" class="c-form form">
                    <label>
                        <span gettext="zolinga-rms:.#84588a">मुख्य ईमेल / लॉगिन</span>
                        <input type="email" autocomplete="" gettext="zolinga-rms:placeholder#260f7e" placeholder="ईमेल" name="username" z-var="username =" required>
                    </label>

                    <label>
                        <span gettext="zolinga-rms:.#983561">वर्तमान पासवर्ड</span>
                        <input type="password" autocomplete="current-password" gettext="zolinga-rms:placeholder#89e79d" placeholder="वर्तमान पासवर्ड" name="currentPassword" required>
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#2ffd6b">पासवर्ड</span>
                        <input type="password" autocomplete="new-password" gettext="zolinga-rms:placeholder#ef0c22" placeholder="पासवर्ड" name="password">
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#fec9a3">पासवर्ड पुष्टि करें</span>
                        <input type="password" gettext="zolinga-rms:placeholder#f8730b" placeholder="पासवर्ड पुष्टि करें" name="confirmPassword">
                    </label>
                </div>

                <div slot="actions">
                    <button class="c-form" type="submit" gettext="zolinga-rms:.#abdb57">सेव करें</button>
                </div>
            </popup-container>
        </form>
    </main>
</body>

</html>
