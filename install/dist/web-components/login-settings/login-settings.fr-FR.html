<html lang="fr-FR">

<head>
    <meta name="gettext" content="translate">
    <link rel="stylesheet" href="login-settings.css">
    <c-resources assets="forms/css"></c-resources>
    <meta charset="UTF-8">
    <meta name="gettext" content="translate">
</head>
<body>
    <main id="security">
        <form action="javascript:">
            <popup-container>
                <div slot="title" gettext="zolinga-rms:.#0f4c4a">Sécurité</div>

                <div slot="content" class="c-form form">
                    <label>
                        <span gettext="zolinga-rms:.#84588a">E-mail principal / Identifiant</span>
                        <input type="email" autocomplete="" gettext="zolinga-rms:placeholder#260f7e" placeholder="Adresse e-mail" name="username" z-var="username =" required>
                    </label>

                    <label>
                        <span gettext="zolinga-rms:.#983561">Mot de passe actuel</span>
                        <input type="password" autocomplete="current-password" gettext="zolinga-rms:placeholder#89e79d" placeholder="Mot de passe actuel" name="currentPassword" required>
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#2ffd6b">Mot de passe</span>
                        <input type="password" autocomplete="new-password" gettext="zolinga-rms:placeholder#ef0c22" placeholder="Mot de passe" name="password">
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#fec9a3">Confirmer le mot de passe</span>
                        <input type="password" gettext="zolinga-rms:placeholder#f8730b" placeholder="Confirmer le mot de passe" name="confirmPassword">
                    </label>
                </div>

                <div slot="actions">
                    <button class="c-form" type="submit" gettext="zolinga-rms:.#abdb57">Enregistrer</button>
                </div>
            </popup-container>
        </form>
    </main>
</body>

</html>
