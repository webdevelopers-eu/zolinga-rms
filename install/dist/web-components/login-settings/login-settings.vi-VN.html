<html lang="vi-VN">

<head>
    <meta name="gettext" content="translate">
    <link rel="stylesheet" href="login-settings.css">
    <c-resources assets="forms/css"></c-resources>
    <meta charset="UTF-8">
    <meta name="gettext" content="translate">
</head>
<body>
    <main id="security">
        <form action="javascript:">
            <popup-container>
                <div slot="title" gettext="zolinga-rms:.#0f4c4a">Bảo mật</div>

                <div slot="content" class="c-form form">
                    <label>
                        <span gettext="zolinga-rms:.#84588a">Email chính / Đăng nhập</span>
                        <input type="email" autocomplete="" gettext="zolinga-rms:placeholder#260f7e" placeholder="Email" name="username" z-var="username =" required>
                    </label>

                    <label>
                        <span gettext="zolinga-rms:.#983561">Mật khẩu hiện tại</span>
                        <input type="password" autocomplete="current-password" gettext="zolinga-rms:placeholder#89e79d" placeholder="Mật khẩu hiện tại" name="currentPassword" required>
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#2ffd6b">Mật khẩu</span>
                        <input type="password" autocomplete="new-password" gettext="zolinga-rms:placeholder#ef0c22" placeholder="Mật khẩu" name="password">
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#fec9a3">Xác nhận mật khẩu</span>
                        <input type="password" gettext="zolinga-rms:placeholder#f8730b" placeholder="Xác nhận mật khẩu" name="confirmPassword">
                    </label>
                </div>

                <div slot="actions">
                    <button class="c-form" type="submit" gettext="zolinga-rms:.#abdb57">Lưu</button>
                </div>
            </popup-container>
        </form>
    </main>
</body>

</html>
