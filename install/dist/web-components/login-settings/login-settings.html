<html>

<head>
    <meta name="gettext" content="translate">
    <link rel="stylesheet" href="login-settings.css">
    <c-resources assets="forms/css"></c-resources>
    <meta charset="UTF-8">
    <meta name="gettext" content="translate">
</head>
<body>
    <main id="security">
        <form action="javascript:">
            <popup-container>
                <div slot="title" gettext="zolinga-rms:.">Security</div>

                <div slot="content" class="c-form form">
                    <label>
                        <span gettext="zolinga-rms:.">Primary Email / Login</span>
                        <input type="email" autocomplete="" gettext="zolinga-rms:placeholder" placeholder="Email" name="username" z-var="username =" required>
                    </label>

                    <label>
                        <span gettext="zolinga-rms:.">Existing Password</span>
                        <input type="password" autocomplete="current-password" gettext="zolinga-rms:placeholder" placeholder="Existing Password" name="currentPassword" required>
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.">Password</span>
                        <input type="password" autocomplete="new-password" gettext="zolinga-rms:placeholder" placeholder="Password" name="password">
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.">Confirm Password</span>
                        <input type="password" gettext="zolinga-rms:placeholder" placeholder="Confirm Password" name="confirmPassword">
                    </label>
                </div>

                <div slot="actions">
                    <button class="c-form" type="submit" gettext="zolinga-rms:.">Save</button>
                </div>
            </popup-container>
        </form>
    </main>
</body>

</html>
