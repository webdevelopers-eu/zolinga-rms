<html>

<head>
    <meta name="gettext" content="translate">
    <link rel="stylesheet" href="login-settings.css">
    <c-resources assets="forms/css"></c-resources>
<meta charset="UTF-8"></head>

<body>
    <main id="security">
        <form action="javascript:">
            <popup-container>
                <div slot="title" gettext="zolinga-rms:.#cc7c83">Security</div>

                <div slot="content" class="c-form form">
                    <label>
                        <span gettext="zolinga-rms:.#d55fda">Primary Email / Login</span>
                        <input type="email" autocomplete="" gettext="zolinga-rms:placeholder#47d14b" placeholder="Email" name="username" z-var="username =" required>
                    </label>

                    <label>
                        <span gettext="zolinga-rms:.#ee6878">Existing Password</span>
                        <input type="password" autocomplete="current-password" gettext="zolinga-rms:placeholder#e9774b" placeholder="Existing Password" name="currentPassword" required>
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#ca6984">Password</span>
                        <input type="password" autocomplete="new-password" gettext="zolinga-rms:placeholder#1d4bbc" placeholder="Password" name="password">
                    </label>
                    <label>
                        <span gettext="zolinga-rms:.#6d0ccb">Confirm Password</span>
                        <input type="password" gettext="zolinga-rms:placeholder#125409" placeholder="Confirm Password" name="confirmPassword">
                    </label>
                </div>

                <div slot="actions">
                    <button class="c-form" type="submit" gettext="zolinga-rms:.#bf1e43">Save</button>
                </div>
            </popup-container>
        </form>
    </main>
</body>

</html>
